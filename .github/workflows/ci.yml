name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Check versions match
        run: task version-check

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: cd sdks/typescript && npm ci
      - name: Typecheck
        run: cd sdks/typescript && npm run typecheck
      - name: Lint
        run: cd sdks/typescript && npm run lint || true
      - name: Test with coverage
        run: cd sdks/typescript && npm test -- --coverage --coverage.thresholds.lines=80

  react:
    name: React SDK
    runs-on: ubuntu-latest
    needs: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          cd sdks/typescript && npm ci && npm run build
          cd ../react && npm ci
      - name: Test with coverage
        run: cd sdks/react && npm test -- --coverage --coverage.thresholds.lines=80

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: cd sdks/python && pip install -e ".[dev]"
      - name: Lint
        run: cd sdks/python && ruff check . || true
      - name: Type check
        run: cd sdks/python && mypy src/ || true
      - name: Test with coverage
        run: cd sdks/python && pytest --cov --cov-fail-under=80

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: cd sdks/go && go build ./...
      - name: Test with coverage
        run: |
          cd sdks/go
          go test -race -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build & Test
        run: cd sdks/java && mvn verify

  kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build & Test
        run: cd sdks/kotlin && ./gradlew test

  php:
    name: PHP SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install
        run: cd sdks/php && composer install
      - name: Test
        run: cd sdks/php && composer test

  swift:
    name: Swift SDK
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: cd sdks/swift && swift test

  ruby:
    name: Ruby SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: sdks/ruby
      - name: Test
        run: cd sdks/ruby && bundle exec rspec

  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build & Test
        run: cd sdks/rust && cargo test

  dart:
    name: Dart SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Install
        run: cd sdks/dart && dart pub get
      - name: Analyze
        run: cd sdks/dart && dart analyze
      - name: Test
        run: cd sdks/dart && dart test

  dotnet:
    name: .NET SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build & Test
        run: cd sdks/dotnet && dotnet test
